<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QRコードリーダー</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 20px; }
    #reader { width: 100%; max-width: 400px; margin: 0 auto; }
    #status { margin-top: 20px; font-size: 18px; font-weight: bold; color: #333; }
  </style>
</head>
<body>

  <h1>QRスキャナー</h1>
  <div id="reader"></div>
  <p id="status">カメラの許可をして、QRコードをかざしてください</p>

  <script>
    // ★ここに今まで使っていたあなたのGASのURLを貼り付けます★
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzSyruVEPh4bN5rilmItU0UIw9tfjwckgzR3-i2eHyvx7eiib_I5x7ovri612lFWNf7hQ/exec";
    let isProcessing = false; // 連続読み取り防止のストッパー

    // QRコードが読み取れた時に実行される処理
    function onScanSuccess(decodedText) {
      // もし処理中（ストッパーがON）なら、何もしない
      if (isProcessing) return;
      
      isProcessing = true; // ストッパーをONにする
      document.getElementById('status').innerText = `読み取り成功！ ID: ${decodedText}\nスプレッドシートへ送信中...`;

      // GASへデータを送信（NFCの時と同じ仕組みで送ります）
      fetch(GAS_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded",
        },
        body: `id=${encodeURIComponent(decodedText)}`
      }).then(() => {
        document.getElementById('status').innerText = `送信完了！\n(3秒後に次を読み取れます)`;
        
        // 3秒後にストッパーを解除して、次の読み取りを可能にする
        setTimeout(() => {
          isProcessing = false;
          document.getElementById('status').innerText = "次のQRコードをかざしてください";
        }, 3000);
      }).catch(err => {
        document.getElementById('status').innerText = `送信エラー: ${err.message}`;
        setTimeout(() => { isProcessing = false; }, 3000); // エラー時も3秒後に解除
      });
    }

    // QRコードリーダーの設定と起動
    let html5QrcodeScanner = new Html5QrcodeScanner(
      "reader", 
      { fps: 10, qrbox: {width: 250, height: 250} }, // 読み取り枠のサイズ
      false
    );
    html5QrcodeScanner.render(onScanSuccess);
  </script>

</body>
</html>
